<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>速读 · __论文标题__</title>
<style>
  :root{
    --bg:#eceef1; --panel:#fff; --ink:#1c2127; --sub:#5b6470;
    --line:#e2e6eb; --accent:#2b6cb0; --accent-soft:#eaf2fb;
    --fig:#fff8ec; --fig-line:#f0dcb8; --hl:#fff3cd;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
       color:var(--ink);background:var(--bg);overflow:hidden;line-height:1.55}
  /* ---- 右栏头部（原顶部 header 移入右侧栏开头） ---- */
  #guide-head{padding:14px 16px 0}
  #guide-head h1{font-size:18px;font-weight:700;line-height:1.4}
  #guide-head .en{font-size:13px;color:var(--sub);font-weight:400;margin-top:2px}
  #guide-head .meta{font-size:12px;color:var(--sub);margin-top:4px}
  #guide-head .meta a{color:var(--accent);text-decoration:none}
  .nav{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;align-items:center;
       position:sticky;top:0;z-index:5;background:#f6f7f9;padding:8px 16px 9px;
       border-bottom:1px solid var(--line);box-shadow:0 2px 5px rgba(0,0,0,.04)}
  .chip{font-size:13px;padding:3px 11px;border:1px solid var(--line);border-radius:14px;
        background:#fafbfc;color:var(--sub);cursor:pointer;user-select:none;
        max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
        transition:background .15s,color .15s,border-color .15s}
  .chip:hover{background:var(--accent-soft);color:var(--accent);border-color:var(--accent)}
  .chip.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:600}
  .pageind{margin-left:auto;font-size:13px;color:var(--sub)}
  /* ---- main split ---- */
  main{display:flex;height:100vh}
  #pdf-pane{width:55%;overflow-y:auto;background:var(--bg);padding:14px 0;text-align:center}
  #pdf-pane .pg{margin:0 auto 14px;box-shadow:0 1px 6px rgba(0,0,0,.16);background:#fff;
                position:relative;display:inline-block;width:96%;scroll-margin-top:14px}
  #pdf-pane canvas{display:block;width:100%;height:auto;border-radius:2px}
  #pdf-pane .pgnum{position:absolute;top:6px;left:6px;font-size:10px;color:#fff;
                   background:rgba(0,0,0,.45);padding:1px 6px;border-radius:8px}
  #resizer{width:6px;cursor:col-resize;background:linear-gradient(var(--line),var(--line));
           flex:0 0 6px}
  #resizer:hover{background:var(--accent)}
  #guide-pane{flex:1;overflow-y:auto;background:#f6f7f9}
  #guide-body{padding:6px 16px 80px}
  /* ---- guide cards ---- */
  .sec-h{font-size:16px;font-weight:700;color:var(--accent);margin:22px 0 10px;
         padding-bottom:5px;border-bottom:2px solid var(--line);display:flex;align-items:center;gap:7px;
         scroll-margin-top:56px}
  .sec-h:first-child{margin-top:0}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:9px;
        padding:11px 13px;margin-bottom:11px;position:relative;scroll-margin-top:56px}
  .card.fig{background:var(--fig);border-color:var(--fig-line)}
  .card .top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px}
  .card .t{font-size:15.5px;font-weight:700;color:var(--ink)}
  .card.fig .t::before{content:"📊 ";}
  .badge{flex:0 0 auto;font-size:12px;font-weight:600;color:#fff;background:var(--accent);
         padding:2px 8px;border-radius:10px;cursor:pointer;white-space:nowrap;text-decoration:none}
  .badge:hover{background:#1f4e7a}
  /* 🔎 取证按钮：只在 pin:true 卡片上出现，比 badge 弱一档（强调可点但不抢戏） */
  .locate{flex:0 0 auto;font-size:12px;font-weight:600;color:var(--accent);background:#fff;
          border:1px solid var(--accent);padding:1px 7px;border-radius:10px;cursor:pointer;
          white-space:nowrap;margin-left:4px;user-select:none}
  .locate:hover{background:var(--accent-soft)}
  /* PDF.js 文本层：透明覆盖在 canvas 上；🔎 命中时局部显黄底 */
  .pg .tl{position:absolute;left:0;top:0;width:100%;height:100%;
          opacity:0;pointer-events:none;line-height:1;--scale-factor:1}
  .pg .tl > span{position:absolute;white-space:pre;transform-origin:0 0;color:transparent}
  .pg .tl.show-hl{opacity:1}
  .pg .tl > span.hover-hl{background:rgba(255,235,59,0.55);border-radius:2px;color:transparent;
                          transition:background 1s ease}
  .pg .tl > span.hover-hl.fading{background:rgba(255,235,59,0)}
  .card p{font-size:15px;color:#2b3138;margin:3px 0}
  .card ul{margin:5px 0 0;padding-left:2px;list-style:none}
  .card li{font-size:15px;color:#2b3138;margin:6px 0;padding-left:16px;position:relative}
  .card li::before{content:"";position:absolute;left:3px;top:10px;width:5px;height:5px;
                   border-radius:50%;background:var(--accent)}
  /* 统一强调：所有粗体一种颜色（蓝），不再用绿、黑、默认混搭 */
  .card li .k,.card .tn,.lead b,.card b,.card.terms li.term b{font-weight:700;color:var(--accent)}
  .card li .k{margin-right:4px}
  .lead{font-size:15.5px;color:#2b3138;line-height:1.65}
  /* 词汇卡：背景定义类型，文字色不再独立硬编码 */
  .card.terms{background:#f4faf6;border-color:#dceee0}
  .card li.term{padding-left:0;margin:11px 0}
  .card li.term::before{display:none}
  .tn{display:block;font-size:1.03em;margin-bottom:2px}
  .flash{animation:fl 1.4s ease}
  @keyframes fl{0%,40%{background:var(--hl)}100%{}}
  /* loading */
  #load{position:absolute;left:0;right:55%;top:0;bottom:0;display:flex;align-items:center;
        justify-content:center;flex-direction:column;gap:10px;color:var(--sub);font-size:13px;background:var(--bg)}
  .spin{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--accent);
        border-radius:50%;animation:sp 0.8s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<main>
  <div id="pdf-pane"><div id="load"><div class="spin"></div><div>正在渲染 PDF…</div></div></div>
  <div id="resizer"></div>
  <div id="guide-pane">
    <div id="guide-head">
      <h1>__中文标题：一句话概括论文主旨__</h1>
      <div class="en">__英文原标题__</div>
      <div class="meta">__作者 et al. · 期刊 卷,页 · 年-月-日 · 机构 · <a href="__DOI_URL__" target="_blank">doi:__DOI__</a>__</div>
    </div>
    <div class="nav" id="nav"><span class="pageind" id="pageind">PDF 加载中…</span><span class="chip" id="fzminus" title="缩小讲解字号">A−</span><span class="chip" id="fzplus" title="放大讲解字号">A+</span></div>
    <div id="guide-body"></div>
  </div>
</main>

<script src="./vendor/pdf.min.js"></script>
<script src="./assets/paper-data.js"></script>
<script src="./vendor/pdf.worker.inline.js"></script>
<script>
/* ============ 中文速读讲解（精读后人工撰写） ============ */
const SECTIONS = [
 // ===== 在此填入本论文的中文速读讲解（Claude 精读后撰写） =====
 // 每个 section = {name:"区名", items:[...]}；item.kind ∈ 'terms' | 'lead' | 'card' | 'fig'
 //  terms 开篇核心词汇卡（绿底）: {kind:"terms", page, t:"分组名", points:[[术语名（中英）, 大白话解释], ...]}
 //  lead  一句话核心            : {kind:"lead",  page, html:`可含 <b>加粗</b> 的 HTML`}
 //  card  普通段落讲解          : {kind:"card",  page, t:"标题", points:[[小标签, 说明], ...]}
 //  fig   图表讲解(cream 底📊)  : {kind:"fig",   page, t:"图N", points:[[panel如"A 分图", 讲解], ...]}
 //  page = 该内容对应的 PDF 物理页码（点右上角 📄P# 跳到左侧该页）
 //
 //  ★ 可选 pin + q（lead / card 用）：只对作者「核心 claim」级的 3-5 张卡片打开
 //    pin:true → 右上角额外渲染「🔎 取证」按钮，点击在 PDF 里高亮原文
 //    q:"英文原文短语" → 用作搜索 key（5-30 字、特征词组；算法会自动归一化软连字符 / 空白 / 大小写）
 //    示例：{kind:"card", page:3, pin:true, q:"secologanin transporter SLTr", ...}
 //  ⚠️ 内容里的引号一律用中文「」或弯引号 "" —— 禁用英文直双引号，否则会截断 JS 字符串
 {name:"🔑 核心词汇（读前必看）", items:[
   {kind:"terms", page:1, t:"方法与工具", points:[
     ["术语名（English）","一句话把这个术语讲清楚，通俗、具体，避免英文直双引号。"]]},
 ]},
 {name:"📌 一句话核心 & 封面", items:[
   {kind:"lead", page:1, html:`本文一句话核心，可用 <b>加粗</b> 强调关键词。`},
 ]},
 // …… 继续按 摘要/引言/结果各部分/讨论/方法 补充 section、逐图一张 fig 卡 ……
];

/* ============ 渲染右侧讲解 ============ */
const guide = document.getElementById('guide-body');
const nav = document.getElementById('nav');
const navAnchor = document.getElementById('pageind');  // chip 始终插入到这个之前 → 保持 SECTIONS 顺序
const escAttr = s => String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
const chipBySec = [];  // chipBySec[si] = chip element，IntersectionObserver 用
SECTIONS.forEach((sec, si)=>{
  const h = document.createElement('div');
  h.className='sec-h'; h.id='sec-'+si; h.textContent=sec.name;
  guide.appendChild(h);
  // nav chip：保留 emoji，截断放宽到 14（CSS 会再用 ellipsis 兜底）
  const chip=document.createElement('span');
  chip.className='chip'; chip.textContent=sec.name.slice(0,14);
  chip.title=sec.name;  // 鼠标悬停看完整名
  chip.onclick=()=>h.scrollIntoView({behavior:'smooth',block:'start'});
  nav.insertBefore(chip, navAnchor);
  chipBySec[si] = chip;
  sec.items.forEach(it=>{
    const c=document.createElement('div');
    c.className='card'+(it.kind==='fig'?' fig':'')+(it.kind==='terms'?' terms':'');
    // pin:true 的 lead/card 多渲染一个 🔎 取证按钮
    const locateBtn = (it.pin && it.q)
      ? `<button class="locate" data-q="${escAttr(it.q)}" data-pg="${it.page}" title="在原文 PDF 里定位「${escAttr(it.q)}」">🔎 取证</button>`
      : '';
    if(it.kind==='lead'){
      c.className='card';
      c.innerHTML=`<div class="top"><div class="t">核心一句话</div><div><a class="badge" data-pg="${it.page}">📄 P${it.page}</a>${locateBtn}</div></div><div class="lead">${it.html}</div>`;
    }
    else{
      let inner=`<div class="top"><div class="t">${it.t}</div><div><a class="badge" data-pg="${it.page}">📄 P${it.page}</a>${locateBtn}</div></div>`;
      inner+='<ul>'+it.points.map(p=> it.kind==='terms'
        ? `<li class="term"><span class="tn">${p[0]}</span>${p[1]}</li>`
        : `<li><span class="k">${p[0]}</span>${p[1]}</li>`).join('')+'</ul>';
      c.innerHTML=inner;
    }
    guide.appendChild(c);
  });
});

// IntersectionObserver：滚动右侧讲解时，把当前可见 section 的 chip 高亮
(function(){
  if(!chipBySec.length || !('IntersectionObserver' in window)) return;
  const headers = chipBySec.map((_,si)=>document.getElementById('sec-'+si));
  let lastActiveIdx = -1;
  const setActive = idx => {
    if(idx === lastActiveIdx) return;
    if(lastActiveIdx >= 0) chipBySec[lastActiveIdx]?.classList.remove('active');
    chipBySec[idx]?.classList.add('active');
    lastActiveIdx = idx;
  };
  setActive(0);
  // 用 scroll 监听 + 自己算最贴近顶部的 sec-h（IO 在 sticky nav 下有边界 case 容易错）
  const guidePane = document.getElementById('guide-pane');
  guidePane.addEventListener('scroll', ()=>{
    const navH = 56;  // 估算 sticky nav 高度
    let bestIdx = 0;
    for(let i=0;i<headers.length;i++){
      const top = headers[i].getBoundingClientRect().top;
      if(top - navH <= 12) bestIdx = i;  // 12px 容差
      else break;
    }
    setActive(bestIdx);
  });
})();
// 页码徽章 → 跳转左侧 PDF
guide.addEventListener('click', e=>{
  const b=e.target.closest('.badge'); if(!b) return;
  const n=b.dataset.pg; const el=document.getElementById('pg-'+n);
  if(el){ el.scrollIntoView({behavior:'smooth',block:'start'}); el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash'); }
});

/* ============ 渲染 PDF（PDF.js，本地、离线） ============ */
const pane=document.getElementById('pdf-pane');
const pageind=document.getElementById('pageind');
let pdfDoc=null, pageEls=[];

function b64ToBytes(b64){
  const bin=atob(b64); const len=bin.length; const bytes=new Uint8Array(len);
  for(let i=0;i<len;i++) bytes[i]=bin.charCodeAt(i);
  return bytes;
}

async function renderAll(){
  // file:// 下用 blob URL 创建同源 worker（绕开本地 worker 安全限制）
  const wblob=new Blob([window.PDF_WORKER_CODE],{type:'application/javascript'});
  pdfjsLib.GlobalWorkerOptions.workerSrc=URL.createObjectURL(wblob);
  const bytes=b64ToBytes(window.PDF_B64);
  pdfDoc=await pdfjsLib.getDocument({data:bytes}).promise;
  document.getElementById('load')?.remove();
  pane.innerHTML='';
  pageEls=[];
  const dpr=Math.min(window.devicePixelRatio||1, 2.5);
  const paneW=pane.clientWidth*0.96-2;
  for(let n=1;n<=pdfDoc.numPages;n++){
    const page=await pdfDoc.getPage(n);
    const base=page.getViewport({scale:1});
    const scale=paneW/base.width;
    const vp=page.getViewport({scale});
    const wrap=document.createElement('div'); wrap.className='pg'; wrap.id='pg-'+n;
    const cv=document.createElement('canvas');
    cv.width=Math.floor(vp.width*dpr); cv.height=Math.floor(vp.height*dpr);
    const tag=document.createElement('div'); tag.className='pgnum'; tag.textContent='P'+n;
    wrap.appendChild(cv); wrap.appendChild(tag); pane.appendChild(wrap);
    pageEls.push(wrap);
    await page.render({canvasContext:cv.getContext('2d'), viewport:vp,
                       transform:dpr!==1?[dpr,0,0,dpr,0,0]:null}).promise;
    pageind.textContent=`第 ${n}/${pdfDoc.numPages} 页`;
  }
  pageind.textContent=`共 ${pdfDoc.numPages} 页 · 点右侧 📄P# 跳转`;
  trackPage();
}
// 滚动时更新"当前页"
function trackPage(){
  pane.addEventListener('scroll', ()=>{
    const mid=pane.scrollTop+pane.clientHeight*0.35;
    let cur=1;
    for(let i=0;i<pageEls.length;i++){ if(pageEls[i].offsetTop<=mid) cur=i+1; }
    pageind.textContent=`第 ${cur}/${pdfDoc.numPages} 页`;
  });
}
renderAll().catch(err=>{
  const l=document.getElementById('load');
  if(l) l.innerHTML='<div style="color:#b00;font-size:13px;padding:20px;text-align:center">PDF 渲染失败：'+err.message+'<br><br>请用 Chrome 打开本文件夹下的 index.html。</div>';
  console.error(err);
});

/* ============ 选择性 🔎 取证：lazy 文本层 + 归一化搜索 + 黄底自动 fade ============
   - 仅在 pin:true 的 lead/card 上有 🔎 按钮
   - 第一次点同一页的 🔎 时才 renderTextLayer 该页（lazy + cache）
   - 搜索算法：page hint 排序 + soft hyphen 去除 + 空白归一化 + 邻 span 间补空格 + case-insensitive
   - 命中：黄底闪 1.5s 自动 fade；未命中：pageind 显示「↳ 取证失败」1.5s 后恢复
============================================================================== */

// 给某页 lazy 渲染文本层（首次点 🔎 时）
async function ensureTextLayer(idx){
  const wrap = pageEls[idx];
  if(!wrap || wrap._tl) return wrap?._tl;
  try {
    const page = await pdfDoc.getPage(idx + 1);
    const base = page.getViewport({scale:1});
    const paneW = pane.clientWidth*0.96-2;
    const scale = paneW/base.width;
    const vp = page.getViewport({scale});
    const tc = await page.getTextContent();
    const tl = document.createElement('div');
    tl.className='tl';
    tl.style.setProperty('--scale-factor', scale);
    wrap.appendChild(tl);
    const tlSpans = [];
    await pdfjsLib.renderTextLayer({
      textContentSource: tc, container: tl, viewport: vp, textDivs: tlSpans,
    }).promise;
    wrap._tl = { spans: tlSpans };
    return wrap._tl;
  } catch(e) {
    console.warn('text layer page', idx+1, 'failed:', e.message);
    return null;
  }
}

// 一次性构建归一化检索串 + 字符 → span 映射
function buildIndex(spans){
  let s = '';
  const map = [];
  let lastCh = '';
  for(let i=0;i<spans.length;i++){
    const t = (spans[i] && spans[i].textContent) || '';
    for(let j=0;j<t.length;j++){
      let c = t[j];
      if(c === '­') continue;          // soft hyphen
      if(/\s/.test(c)){
        c = ' ';
        if(lastCh === ' ') continue;       // 折叠空白
      }
      s += c;
      map.push({spanIdx:i, charInSpan:j});
      lastCh = c;
    }
    if(i < spans.length - 1 && lastCh !== ' '){
      s += ' ';
      map.push({spanIdx:i, charInSpan:Math.max(0, t.length-1)});
      lastCh = ' ';
    }
  }
  return { norm:s, normLower:s.toLowerCase(), map };
}

const normQ = q => String(q).replace(/­/g,'').replace(/\s+/g,' ').trim().toLowerCase();

function pageSearchOrder(n, center0){
  const order = [];
  const c = Math.max(0, Math.min(n-1, center0|0));
  order.push(c);
  for(let off=1; off<n; off++){
    if(c-off >= 0) order.push(c-off);
    if(c+off < n) order.push(c+off);
  }
  return order;
}

let fadeTimer = null;
function clearHL(){
  document.querySelectorAll('.tl.show-hl').forEach(t=>t.classList.remove('show-hl'));
  document.querySelectorAll('.tl > span.hover-hl').forEach(s=>{
    s.classList.remove('hover-hl'); s.classList.remove('fading');
  });
  if(fadeTimer){ clearTimeout(fadeTimer); fadeTimer = null; }
}

async function findAndHL(q, hintPage){
  if(!q || !pdfDoc) return;
  clearHL();
  const nq = normQ(q);
  if(!nq) return;
  const order = pageSearchOrder(pageEls.length, (hintPage|0) - 1);
  for(const idx of order){
    const tl = await ensureTextLayer(idx);
    if(!tl || !tl.spans || !tl.spans.length) continue;
    if(!tl.index) tl.index = buildIndex(tl.spans);
    const pos = tl.index.normLower.indexOf(nq);
    if(pos < 0) continue;
    const startMap = tl.index.map[pos];
    const endMap   = tl.index.map[Math.min(pos + nq.length - 1, tl.index.map.length - 1)];
    if(!startMap || !endMap) continue;
    const startSpan = startMap.spanIdx;
    const endSpan   = endMap.spanIdx;
    const wrap = pageEls[idx];
    const tlEl = wrap.querySelector('.tl');
    if(tlEl) tlEl.classList.add('show-hl');
    for(let i=startSpan; i<=endSpan; i++){
      tl.spans[i] && tl.spans[i].classList.add('hover-hl');
    }
    tl.spans[startSpan] && tl.spans[startSpan].scrollIntoView({behavior:'smooth', block:'center'});
    pageind.textContent = `↳ 命中第 ${idx+1} 页`;
    // 1.5s 后自动 fade
    fadeTimer = setTimeout(()=>{
      document.querySelectorAll('.tl > span.hover-hl').forEach(s=>s.classList.add('fading'));
      setTimeout(clearHL, 1100);  // 等动画结束
    }, 1500);
    return;
  }
  // 未找到
  pageind.textContent = `↳ 取证失败：未找到「${q.length>20 ? q.slice(0,20)+'…' : q}」`;
  fadeTimer = setTimeout(()=>{
    if(pdfDoc) pageind.textContent = `共 ${pdfDoc.numPages} 页 · 点右侧 📄P# 跳转`;
  }, 2000);
}

// 委托：click .locate 按钮就触发
guide.addEventListener('click', e=>{
  const btn = e.target.closest('.locate');
  if(!btn) return;
  e.stopPropagation();   // 别冒泡到 badge 跳页处理
  const q = btn.dataset.q;
  const hintPage = parseInt(btn.dataset.pg, 10) || 1;
  findAndHL(q, hintPage);
});

/* ============ 可拖动分隔条 ============ */
const rz=document.getElementById('resizer');
let drag=false;
rz.addEventListener('mousedown',()=>{drag=true;document.body.style.userSelect='none';});
window.addEventListener('mouseup',()=>{
  if(drag){drag=false;document.body.style.userSelect='';
    clearTimeout(window._rt); window._rt=setTimeout(renderAll,150);} // 重渲染保清晰
});
window.addEventListener('mousemove',e=>{
  if(!drag) return;
  const pct=Math.min(75,Math.max(30, e.clientX/window.innerWidth*100));
  document.getElementById('pdf-pane').style.width=pct+'%';
});

/* ============ 讲解区字号缩放（A− / A+，本地记忆） ============ */
(function(){
  const gp=document.getElementById('guide-body');
  let z=parseFloat(localStorage.getItem('paperGZ')||'1');
  const apply=()=>{gp.style.zoom=z; localStorage.setItem('paperGZ',z);};
  apply();
  document.getElementById('fzminus').onclick=()=>{z=Math.max(0.8,Math.round((z-0.1)*10)/10);apply();};
  document.getElementById('fzplus').onclick=()=>{z=Math.min(1.7,Math.round((z+0.1)*10)/10);apply();};
})();
</script>
